version: 2
project_name: hzuul

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/hzuul
    binary: hzuul
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: Valkyrie00
    name: hzuul
  draft: false
  prerelease: auto
  header: |
    ## HZUUL {{ .Version }}

    Install or upgrade:
    ```bash
    curl -fsSL https://raw.githubusercontent.com/Valkyrie00/hzuul/main/install.sh | bash
    ```

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "Features"
      regexp: "^.*feat[(\\w)]*:.*$"
      order: 0
    - title: "Bug Fixes"
      regexp: "^.*fix[(\\w)]*:.*$"
      order: 1
    - title: "Refactoring"
      regexp: "^.*refactor[(\\w)]*:.*$"
      order: 2
    - title: "Performance"
      regexp: "^.*perf[(\\w)]*:.*$"
      order: 3
